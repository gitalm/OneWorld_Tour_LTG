<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>One World Tour</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; }
        #overlayImg { position: absolute; bottom: 30px; right: 30px; width: 300px; display: none; border: 4px solid white; border-radius: 10px; transition: opacity 1s; opacity: 0; }
    </style>
</head>
<body>
    <img id="overlayImg" src="">
    <div id="cesiumContainer"></div>
    <script>
        Cesium.Ion.defaultAccessToken = 'DEIN_TOKEN_HIER';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.Terrain.fromWorldTerrain(),
            baseLayerPicker: false
        });

        const stops = [
            { name: "Dublin", pos: [-6.2603, 53.3498, 800], img: "https://media.giphy.com/media/l41lTjJp9hYyO1T1e/giphy.gif" },
            { name: "Copacabana", pos: [-43.1770, -22.9711, 800], img: "https://media.giphy.com/media/l41lTjJp9hYyO1T1e/giphy.gif" }
        ];

        let i = 0;
        async function nextStop() {
            const stop = stops[i];
            const overlay = document.getElementById('overlayImg');
            overlay.src = stop.img;
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.opacity = '1'; }, 50);
            
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(stop.pos[0], stop.pos[1], stop.pos[2]),
                orientation: { pitch: Cesium.Math.toRadians(-45.0) },
                duration: 5
            });
            i = (i + 1) % stops.length;
        }

        async function init() {
            try {
                const buildings = await Cesium.createOsmBuildingsAsync();
                viewer.scene.primitives.add(buildings);
            } catch (e) { console.error("Gebäude-Fehler:", e); }
        }
        
        document.addEventListener('keydown', (e) => { if (e.code === 'Space') nextStop(); });
        init();
    </script>
</body>
</html>

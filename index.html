<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>One World Tour</title>
    <!-- Pfade anpassen, falls du die Dateien lokal in einem Ordner namens 'Cesium' hast -->
    <script src="Cesium/Cesium.js"></script>
    <link href="Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; }
        #overlayImg { position: absolute; bottom: 30px; right: 30px; width: 300px; display: none; border: 4px solid white; border-radius: 10px; transition: opacity 1s; opacity: 0; }
        #status { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="status">Drücke Leertaste für die nächste Destination</div>
    <img id="overlayImg" src="">
    <div id="cesiumContainer"></div>

    <script type="module">
        // Token setzen
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1NGU3YzJkYi1mNTRjLTQxNDAtYTA2Ny02OTJlMjFiMzljOWUiLCJpZCI6NDQ1MTUxLCJzdWIiOiJBbEoiLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoiT25lV29ybGQiLCJpYXQiOjE3ODE2MDQwNTl9.bWQpQQXdJoZ1CLp190p4YJkS9AtMi0m99vyVMOOejYY';

        let viewer;
        async function init() {
            try {
                viewer = new Cesium.Viewer('cesiumContainer', {
                    terrainProvider: await Cesium.createWorldTerrainAsync({ assetId: 1 }),
                    baseLayerPicker: false,
                    animation: false,
                    timeline: false
                });
                const buildings = await Cesium.createOsmBuildingsAsync();
                viewer.scene.primitives.add(buildings);
                
                // Startansicht: Über der Schule
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(12.348358, 47.85701, 2000)
                });
            } catch (error) { console.error("Initialisierungs-Fehler:", error); }
        }

        const stops = [
            { name: "Schule", pos: [12.348358, 47.85701, 1000], img: "" }, // Startpunkt
            { name: "Dublin", pos: [-6.2603, 53.3498, 800], img: "https://media.giphy.com/media/l41lTjJp9hYyO1T1e/giphy.gif" },
            { name: "Rio de Janeiro", pos: [-43.2105, -22.9519, 1000], img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ4ZzNqZ2J4ZzNqZ2J4ZzNqZ2J4ZzNqZ2J4ZzNqZ2J4ZzNqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lTjJp9hYyO1T1e/giphy.gif" },
            { name: "Schule", pos: [12.348358, 47.85701, 1000], img: "" } // Endpunkt
        ];

        let i = 0;
        function nextStop() {
            if (!viewer) return;
            const stop = stops[i];
            const overlay = document.getElementById('overlayImg');
            
            // Bild-Logik: Nur anzeigen, wenn ein Link vorhanden ist
            if (stop.img) {
                overlay.src = stop.img;
                overlay.style.display = 'block';
                setTimeout(() => { overlay.style.opacity = '1'; }, 50);
                setTimeout(() => { 
                    overlay.style.opacity = '0'; 
                    setTimeout(() => { overlay.style.display = 'none'; }, 1000); 
                }, 10000);
            }

            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(stop.pos[0], stop.pos[1], stop.pos[2]),
                orientation: { pitch: Cesium.Math.toRadians(-30.0), roll: 0.0 },
                duration: 12
            });

            i = (i + 1) % stops.length;
        }

        document.addEventListener('keydown', (e) => { if (e.code === 'Space') nextStop(); });
        init();
    </script>
</body>
</html>

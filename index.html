<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>One World Tour</title>
    <script src="./Cesium/Cesium.js"></script>
    <link href="./Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #overlayImg { position: absolute; bottom: 30px; right: 30px; width: 300px; display: none; border: 4px solid white; border-radius: 10px; transition: opacity 1s; opacity: 0; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); color: white; padding: 15px; border-radius: 8px; pointer-events: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="ui">
        <h2>One World Musikreise</h2>
        <p>Drücke die <b>Leertaste</b> für den nächsten Stopp</p>
    </div>
    <img id="overlayImg" src="">
    <div id="cesiumContainer"></div>

    <script type="module">
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1NGU3YzJkYi1mNTRjLTQxNDAtYTA2Ny02OTJlMjFiMzljOWUiLCJpZCI6NDQ1MTUxLCJzdWIiOiJBbEoiLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoiT25lV29ybGQiLCJpYXQiOjE3ODE2MDQwNTl9.bWQpQQXdJoZ1CLp190p4YJkS9AtMi0m99vyVMOOejYY';

        let viewer;
        async function init() {
            viewer = new Cesium.Viewer('cesiumContainer', {
                terrainProvider: await Cesium.createWorldTerrainAsync({ assetId: 1 }),
                baseLayerPicker: false,
                animation: false,
                timeline: false,
                fullscreenButton: false
            });
            const buildings = await Cesium.createOsmBuildingsAsync();
            viewer.scene.primitives.add(buildings);
            
            // Start-Ansicht: Höher (5000m) für besseren Überblick
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(12.348358, 47.85701, 5000)
            });
        }

        const stops = [
            { name: "Dublin", pos: [-6.2603, 53.3498, 1200], img: "https://media.giphy.com/media/l41lTjJp9hYyO1T1e/giphy.gif" },
            { name: "Rio de Janeiro", pos: [-43.2105, -22.9519, 1500], img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJ4ZzNqZ2J4ZzNqZ2J4ZzNqZ2J4ZzNqZ2J4ZzNqZ2J4ZzNqJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lTjJp9hYyO1T1e/giphy.gif" },
            { name: "Schule", pos: [12.348358, 47.85701, 5000], img: "" }
        ];

        let i = 0;
        function nextStop() {
            const stop = stops[i];
            const overlay = document.getElementById('overlayImg');
            
            if (stop.img) {
                overlay.src = stop.img;
                overlay.style.display = 'block';
                setTimeout(() => { overlay.style.opacity = '1'; }, 50);
                setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => { overlay.style.display = 'none'; }, 1000); }, 10000);
            }
            
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(stop.pos[0], stop.pos[1], stop.pos[2]),
                orientation: { pitch: Cesium.Math.toRadians(-35.0), roll: 0.0 },
                duration: 12
            });
            i = (i + 1) % stops.length;
        }

        document.addEventListener('keydown', (e) => { if (e.code === 'Space') nextStop(); });
        init();
    </script>
</body>
</html>

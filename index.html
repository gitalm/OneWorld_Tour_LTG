<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>One World - Musikreise</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 1; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 8px; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">
        <h2>One World Reise</h2>
        <p>Drücke die <b>Leertaste</b> für den nächsten Stopp.</p>
        <p id="status">Bereit für den Start...</p>
    </div>
    <div id="cesiumContainer"></div>

    <script>
        // 1. Dein Token (Bitte im Cesium Dashboard für deine URL einschränken!)
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1NGU3YzJkYi1mNTRjLTQxNDAtYTA2Ny02OTJlMjFiMzljOWUiLCJpZCI6NDQ1MTUxLCJzdWIiOiJBbEoiLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoiT25lV29ybGQiLCJpYXQiOjE3ODE2MDQwNTl9.bWQpQQXdJoZ1CLp190p4YJkS9AtMi0m99vyVMOOejYY';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrain: Cesium.Terrain.fromWorldTerrain()
        });

        // 2. Gebäude hinzufügen
        const tileset = viewer.scene.primitives.add(new Cesium.Cesium3DTileset({
            url: Cesium.IonResource.fromAssetId(96188)
        }));

        // 3. Reiseziele definieren (Längengrad, Breitengrad, Höhe)
        const stops = [
            { name: "Dublin", pos: [-6.2603, 53.3498, 800] },
            { name: "Helsinki", pos: [24.9384, 60.1699, 800] },
            { name: "Buenos Aires", pos: [-58.3816, -34.6037, 800] }
        ];

        let i = 0;

        function nextStop() {
            const stop = stops[i];
            document.getElementById('status').innerText = "Reise nach: " + stop.name;
            
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(stop.pos[0], stop.pos[1], stop.pos[2]),
                orientation: { pitch: Cesium.Math.toRadians(-45.0) },
                duration: 4
            });

            i = (i + 1) % stops.length;
        }

        // Steuerung per Leertaste
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') nextStop();
        });
    </script>
</body>
</html>

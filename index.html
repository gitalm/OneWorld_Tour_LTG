<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>One World - Reise</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.107/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 1; background: rgba(0,0,0,0.6); color: white; padding: 15px; border-radius: 8px; font-family: sans-serif; }
        #overlayImg { position: absolute; bottom: 30px; right: 30px; width: 300px; display: none; border: 4px solid white; border-radius: 10px; transition: opacity 1s ease-in-out; opacity: 0; }
    </style>
</head>
<body>
    <div id="info">
        <h2>One World Reise</h2>
        <p>Leertaste für den nächsten Stopp</p>
        <p id="status">Bereit zum Start...</p>
    </div>
    <img id="overlayImg" src="" alt="Kultur-Info">
    <div id="cesiumContainer"></div>

    <script>
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI1NGU3YzJkYi1mNTRjLTQxNDAtYTA2Ny02OTJlMjFiMzljOWUiLCJpZCI6NDQ1MTUxLCJzdWIiOiJBbEoiLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoiT25lV29ybGQiLCJpYXQiOjE3ODE2MDQwNTl9.bWQpQQXdJoZ1CLp190p4YJkS9AtMi0m99vyVMOOejYY';

        // 1. Definiere ArcGIS als Provider
        const arcGisImagery = new Cesium.ArcGisMapServerImageryProvider({
            url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
        });

        // 2. Initialisiere den Viewer OHNE Bing, NUR mit ArcGIS
        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: arcGisImagery,
            baseLayerPicker: false, // Deaktiviert den Layer-Auswähler, der Bing erzwingt
            terrainProvider: Cesium.createWorldTerrain()
        });

        const tileset = viewer.scene.primitives.add(new Cesium.Cesium3DTileset({
            url: Cesium.IonResource.fromAssetId(96188)
        }));

        const stops = [
            { name: "Dublin, Irland", pos: [-6.2603, 53.3498, 800], img: "https://media.giphy.com/media/l41lTjJp9hYyO1T1e/giphy.gif" },
            { name: "Copacabana, Brasilien", pos: [-43.1770, -22.9711, 800], img: "https://media.giphy.com/media/l41lTjJp9hYyO1T1e/giphy.gif" }
        ];

        let i = 0;
        const overlay = document.getElementById('overlayImg');

        function nextStop() {
            const stop = stops[i];
            overlay.src = stop.img;
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.opacity = '1'; }, 50);

            document.getElementById('status').innerText = "Anflug: " + stop.name;
            
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(stop.pos[0], stop.pos[1], stop.pos[2]),
                orientation: { pitch: Cesium.Math.toRadians(-45.0) },
                duration: 5
            });

            i = (i + 1) % stops.length;
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') nextStop();
        });
    </script>
</body>
</html>
